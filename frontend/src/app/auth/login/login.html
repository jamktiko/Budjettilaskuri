<img src="/logo.png" alt="Logo" class="logo" />
<div class="login-container">
  <amplify-authenticator [loginMechanisms]="['email']" [formFields]="formFields">
    <ng-template amplifySlot="header" amplifySlot="authenticated">
      <div style="text-align: center; padding: 1rem">
        <!--<img src="/logo.png" alt="Logo" class="logo" /> -->
      </div>
    </ng-template>

    <ng-template amplifySlot="footer">
      <div style="text-align: center; padding: 1rem">
        <p style="font-size: 0.8rem; color: gray">&copy; 2026 Budjettilaskuri</p>
      </div>
    </ng-template>
  </amplify-authenticator>
</div>
