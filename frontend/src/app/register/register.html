<div class="login-container">
  <mat-card>
    <h2>Luo uusi tili</h2>

    <form *ngIf="!isConfirming" (ngSubmit)="register()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Käyttäjätunnus</mat-label>
        <input matInput [(ngModel)]="username" name="username" required />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Sähköposti</mat-label>
        <input matInput type="email" [(ngModel)]="email" name="email" required />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Salasana</mat-label>
        <input matInput type="password" [(ngModel)]="password" name="password" required />
      </mat-form-field>

      <button mat-raised-button color="primary" type="submit" class="full-width">
        Rekisteröidy
      </button>

      <p style="text-align: center; margin-top: 15px">
        Onko sinulla jo tili? <a routerLink="/login">Kirjaudu sisään</a>
      </p>
    </form>

    <form *ngIf="isConfirming" (ngSubmit)="confirm()">
      <p>Sähköpostiisi on lähetetty vahvistuskoodi. Syötä se alle aktivoidaksesi tilisi.</p>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Vahvistuskoodi</mat-label>
        <input matInput [(ngModel)]="confirmationCode" name="confirmationCode" required />
      </mat-form-field>

      <button mat-raised-button color="accent" type="submit" class="full-width">
        Vahvista tili
      </button>
    </form>
  </mat-card>
</div>
