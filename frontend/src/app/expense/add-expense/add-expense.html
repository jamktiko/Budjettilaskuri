<mat-card class="form">
  <h2>Lisää tapahtuma</h2>

  <!-- TYPE TOGGLE -->
  <div class="toggle">
    <button
      mat-raised-button
      (click)="setType('expense')"
      [color]="type === 'expense' ? 'primary' : ''"
    >
      Kulu
    </button>

    <button
      mat-raised-button
      (click)="setType('income')"
      [color]="type === 'income' ? 'primary' : ''"
    >
      Tulo
    </button>
  </div>

  <!-- CATEGORY (molemmille sama) -->
  <mat-form-field appearance="outline">
    <mat-label>Kategoria</mat-label>
    <input matInput [(ngModel)]="category" />
  </mat-form-field>

  <!-- AMOUNT -->
  <mat-form-field appearance="outline">
    <mat-label>Summa</mat-label>
    <input matInput type="number" [(ngModel)]="amount" />
  </mat-form-field>

  <!-- NOTE (optional) -->
  <mat-form-field appearance="outline">
    <mat-label>Muistiinpano</mat-label>
    <input matInput [(ngModel)]="note" />
  </mat-form-field>

  <!-- SAVE -->
  <button mat-raised-button color="primary" (click)="save()" [disabled]="loading">
    {{ loading ? 'Tallennetaan...' : 'Lisää' }}>Lisää
  </button>
</mat-card>
